<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Print | Patxi Barciela</title>
<meta name="description" content="Portfolio: visuell identitet, broschyrer och kampanjer" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          accent: { DEFAULT: "#0f7d8f", dark: "#0b616f", light: "#e6f3f4" },
          ink: "#1f2328"
        },
        fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] }
      }
    }
  };
</script>

<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-white text-ink antialiased">

<header id="site-header" class="border-b border-gray-100 sticky top-0 bg-white/95 backdrop-blur z-50"></header>

<section class="max-w-6xl mx-auto px-6 pt-16 pb-12">
  <p class="text-accent text-sm font-semibold uppercase tracking-widest mb-3">Portfolio</p>
  <h1 class="text-3xl md:text-4xl font-semibold">Print</h1>
  <p class="text-gray-500 mt-4 max-w-xl">Visuell identitet, broschyrer och kampanjer</p>
</section>

<section class="max-w-6xl mx-auto px-6 pb-24">
  <div id="portfolio-grid" class="grid md:grid-cols-3 gap-8"></div>
</section>

<footer id="site-footer" class="border-t border-gray-100 py-10"></footer>

<div id="lightbox-overlay" class="lightbox-overlay">
  <div class="lightbox-content">
    <button id="lightbox-close" class="lightbox-close" aria-label="Stäng">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <img id="lightbox-image" src="" alt="" />
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>
</div>

<script src="js/layout.js"></script>
<script src="js/data/print.js"></script>
<script src="js/portfolio-grid.js"></script>
<script src="js/main.js"></script>
</body>
</html>
